services:
  - type: web
    name: mip-frontend
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: BACKEND_URL
        value: https://mip-backend.onrender.com

  - type: web
    name: mip-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install --include=dev && npm run build
    startCommand: npx prisma db push && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: mip-postgres-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CREDENTIAL_ENCRYPTION_KEY
        generateValue: true
      - key: CORS_ORIGIN
        fromService:
          name: mip-frontend
          type: web
          property: host
      - key: FRONTEND_URL
        fromService:
          name: mip-frontend
          type: web
          property: host
      - key: OPENAI_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: OPENAI_MINI_MODEL
        value: gpt-4o-mini

databases:
  - name: mip-postgres-db
    plan: free
