services:
  - type: web
    name: venmai-web
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: BACKEND_URL
        value: https://venmai-api.onrender.com
      - key: VITE_MOCK_MODE
        value: "false"
      - key: VITE_TENANT_ID
        value: agency
      - key: VITE_AUTH_TOKEN
        sync: false

  - type: web
    name: venmai-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install --include=dev && npm run build
    startCommand: npx prisma db push && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: mip-postgres-db
          property: connectionString
      - key: JWT_SECRET
        value: dev-secret
      - key: CREDENTIAL_ENCRYPTION_KEY
        generateValue: true
      - key: CORS_ORIGIN
        value: https://venmai-web.onrender.com
      - key: FRONTEND_URL
        value: https://venmai-web.onrender.com
      - key: OPENAI_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: OPENAI_MINI_MODEL
        value: gpt-4o-mini

# Reuse existing free DB (Render allows only one free Postgres).
databases:
  - name: mip-postgres-db
    plan: free
