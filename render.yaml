services:
  - type: web
    name: mip-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: mip-postgres-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CREDENTIAL_ENCRYPTION_KEY
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
      - key: FRONTEND_URL
        sync: false

databases:
  - name: mip-postgres-db
    plan: free
